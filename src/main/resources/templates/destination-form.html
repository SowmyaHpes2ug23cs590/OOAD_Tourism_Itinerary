<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Destination - Tourism Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1d27;
            --primary: #4A90D9;
            --text: #ffffff;
            --text-muted: #8b92a5;
            --input-bg: #11131a;
            --border: #2a2e3d;
        }
        body { background-color: var(--bg-color); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        .navbar { background-color: var(--card-bg); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .navbar .brand { font-size: 20px; font-weight: 700; color: var(--primary); }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 32px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 12px 16px; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; box-sizing: border-box; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2); }
        .btn-primary { width: 100%; padding: 12px; background-color: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn-primary:hover { background-color: #3b76b3; }
        option { background-color: var(--input-bg); color: var(--text); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Tourism Planner</div>
        <nav><a th:href="@{'/destinations/' + ${itineraryId}}" style="color: var(--text); text-decoration: none;">Cancel</a></nav>
    </nav>
    <div class="container">
        <div class="card">
            <h2 style="margin-top: 0; margin-bottom: 24px;">Add Destination</h2>
            <form th:action="@{/destinations/add}" method="post">
                <input type="hidden" name="itineraryId" th:value="${itineraryId}">
                <div class="form-group">
                    <label>Destination Name</label>
                    <input type="text" name="name" required placeholder="E.g., Eiffel Tower, Waikiki Beach">
                </div>
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label>City</label>
                        <input type="text" name="city" required placeholder="E.g., Paris">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Country</label>
                        <input type="text" name="country" required placeholder="E.g., France">
                    </div>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="type" required>
                        <option th:each="type : ${types}" th:value="${type}" th:text="${type}">BEACH</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Best Season</label>
                    <input type="text" name="bestSeason" placeholder="E.g., Spring, Summer">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="3" placeholder="Personal notes or reminders..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Save Destination</button>
            </form>
        </div>
    </div>
</body>
</html>
