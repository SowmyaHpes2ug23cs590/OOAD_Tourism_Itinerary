<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Tourism Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: shared-styles}"></th:block>
    <style>
        .container { max-width: 640px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 36px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

        .avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; margin-bottom: 20px; }
        .profile-name { font-size: 24px; font-weight: 700; margin: 0 0 4px; }
        .profile-email { color: var(--text-muted); font-size: 14px; margin: 0 0 28px; }
        
        .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
        .section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 18px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2); }

        .meta-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .meta-label { color: var(--text-muted); font-size: 14px; }
        .meta-value { font-size: 14px; font-weight: 500; }

        .btn-primary { padding: 12px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .btn-primary:hover { background: #3b76b3; }

        .alert-success { background: #1e3a2f; color: #4caf7d; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; border: 1px solid rgba(76, 175, 125, 0.3); }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <div th:replace="~{fragments/navbar :: sidebar}"></div>

    <div class="container">
        <div class="card">
            <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(user.name, 0, 1))}">A</div>
            <h2 class="profile-name" th:text="${user.name}">Full Name</h2>
            <p class="profile-email" th:text="${user.email}">email@example.com</p>

            <div th:if="${success}" class="alert-success" th:text="${success}">Updated!</div>

            <!-- Account Meta -->
            <p class="section-title">Account Details</p>
            <div class="meta-item">
                <span class="meta-label">Member Since</span>
                <span class="meta-value" th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Jan 2024</span>
            </div>
            <div class="meta-item" style="border:none;">
                <span class="meta-label">Account Status</span>
                <span class="meta-value" style="color:#4caf7d;">Active</span>
            </div>

            <hr class="divider">

            <!-- Edit Form -->
            <p class="section-title">Edit Profile</p>
            <form th:action="@{/profile/update}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" th:value="${user.name}" required>
                </div>
                <div class="form-group">
                    <label>New Password <span style="font-size:11px;color:var(--text-muted);">(leave blank to keep current)</span></label>
                    <input type="password" name="newPassword" placeholder="Enter new password...">
                </div>
                <button type="submit" class="btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script th:replace="~{fragments/navbar :: sidebar-script}"></script>
</body>
</html>
