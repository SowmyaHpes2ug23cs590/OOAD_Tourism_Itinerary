<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Booking - Tourism Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1d27;
            --primary: #4A90D9;
            --text: #ffffff;
            --text-muted: #8b92a5;
            --input-bg: #11131a;
            --border: #2a2e3d;
        }
        body { background-color: var(--bg-color); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        .navbar { background-color: var(--card-bg); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .navbar .brand { font-size: 20px; font-weight: 700; color: var(--primary); }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 32px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .form-row { display: flex; gap: 16px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input { width: 100%; padding: 12px 16px; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; box-sizing: border-box; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2); }
        input:disabled { opacity: 0.7; border-color: transparent; }
        .btn-primary { width: 100%; padding: 12px; background-color: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn-primary:hover { background-color: #3b76b3; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Tourism Planner</div>
        <nav><a th:href="@{'/bookings/' + ${itineraryId}}" style="color: var(--text); text-decoration: none;">Cancel</a></nav>
    </nav>
    <div class="container">
        <div class="card">
            <h2 style="margin-top: 0; margin-bottom: 24px;">Add Hotel Booking</h2>
            <form th:action="@{/bookings/add}" method="post" id="bookingForm">
                <input type="hidden" name="itineraryId" th:value="${itineraryId}">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Hotel Name</label>
                        <input type="text" name="hotelName" required placeholder="E.g., Grand Plaza">
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" required placeholder="E.g., Paris">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Check-In</label>
                        <input type="date" id="checkIn" name="checkIn" required>
                    </div>
                    <div class="form-group">
                        <label>Check-Out</label>
                        <input type="date" id="checkOut" name="checkOut" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Price Per Night ($)</label>
                        <input type="number" id="price" name="pricePerNight" step="0.01" min="0" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Total Cost ($) <span style="font-size:11px;color:#4A90D9;">Auto-calculated</span></label>
                        <input type="text" id="totalCost" disabled placeholder="0.00">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label>Booking Reference</label>
                    <input type="text" name="bookingRef" placeholder="Optional (e.g., CONF1234)">
                </div>
                
                <button type="submit" class="btn-primary">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>
        const checkIn = document.getElementById('checkIn');
        const checkOut = document.getElementById('checkOut');
        const price = document.getElementById('price');
        const total = document.getElementById('totalCost');

        function calculateTotal() {
            if (checkIn.value && checkOut.value && price.value) {
                const date1 = new Date(checkIn.value);
                const date2 = new Date(checkOut.value);
                const timeDiff = date2.getTime() - date1.getTime();
                
                if (timeDiff > 0) {
                    const nights = Math.ceil(timeDiff / (1000 * 3600 * 24));
                    const cost = nights * parseFloat(price.value);
                    total.value = cost.toFixed(2);
                } else {
                    total.value = "Invalid dates";
                }
            } else {
                total.value = "0.00";
            }
        }

        checkIn.addEventListener('change', calculateTotal);
        checkOut.addEventListener('change', calculateTotal);
        price.addEventListener('input', calculateTotal);
    </script>
</body>
</html>
