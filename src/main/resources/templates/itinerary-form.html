<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Itinerary - Tourism Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1d27;
            --primary: #4A90D9;
            --text: #ffffff;
            --text-muted: #8b92a5;
            --input-bg: #11131a;
            --border: #2a2e3d;
        }
        body { background-color: var(--bg-color); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
        .navbar { background-color: var(--card-bg); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .navbar .brand { font-size: 20px; font-weight: 700; color: var(--primary); }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 32px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input, textarea { width: 100%; padding: 12px 16px; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; box-sizing: border-box; transition: all 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2); }
        .btn-primary { width: 100%; padding: 12px; background-color: var(--primary); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; transition: background-color 0.3s; }
        .btn-primary:hover { background-color: #3b76b3; }
        .alert-error { background-color: rgba(231, 76, 60, 0.1); color: #e74c3c; padding: 12px; border-radius: 8px; border: 1px solid rgba(231, 76, 60, 0.2); margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Tourism Planner</div>
        <nav><a th:href="@{/itineraries}" style="color: var(--text); text-decoration: none;">Cancel</a></nav>
    </nav>
    <div class="container">
        <div class="card">
            <h2 style="margin-top: 0; margin-bottom: 24px;" th:text="${itinerary.id == null ? 'Create New Itinerary' : 'Update Itinerary'}">Create New Itinerary</h2>
            <div th:if="${param.error}" class="alert-error" th:text="${param.error}">Error</div>
            <form th:action="@{${itinerary.id == null ? '/itineraries/new' : '/itineraries/' + itinerary.id + '/edit'}}" method="post">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" required placeholder="E.g., Summer in Paris" th:value="${itinerary.title}">
                </div>
                <div class="form-group">
                    <label>Destination Summary</label>
                    <textarea name="destinationSummary" rows="3" placeholder="Brief description of the trip..." th:text="${itinerary.destinationSummary}"></textarea>
                </div>
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Start Date</label>
                        <input type="date" name="startDate" required th:value="${itinerary.startDate}">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>End Date</label>
                        <input type="date" name="endDate" required th:value="${itinerary.endDate}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Total Estimated Budget ($)</label>
                    <input type="number" step="0.01" min="0.01" name="totalBudget" required placeholder="5000.00" th:value="${itinerary.totalBudget}">
                </div>
                <button type="submit" class="btn-primary" th:text="${itinerary.id == null ? 'Save Itinerary' : 'Update Itinerary'}">Save Itinerary</button>
            </form>
        </div>
    </div>
</body>
</html>
