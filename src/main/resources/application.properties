spring.application.name=Tourism Itinerary Planner

# ===== DATABASE CONFIGURATION =====
# Update the password below to match your MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/tourism_planner?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== THYMELEAF =====
spring.thymeleaf.cache=false

# ===== SERVER =====
server.port=8080
